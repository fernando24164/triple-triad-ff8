networks:
  tt_integration:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  host:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tt-integration-host
    command: ["--host-test", "--headless"]
    networks:
      tt_integration:
        ipv4_address: 172.28.0.10
    environment:
      - SDL_AUDIODRIVER=dummy
      - SDL_VIDEODRIVER=dummy
      - PYTHONPATH=/app

  guest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tt-integration-guest
    command: ["--join-test", "172.28.0.10", "--headless"]
    networks:
      tt_integration:
        ipv4_address: 172.28.0.11
    environment:
      - SDL_AUDIODRIVER=dummy
      - SDL_VIDEODRIVER=dummy
      - PYTHONPATH=/app
    depends_on:
      - host
